<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
    </head>
    <style>
        body{
            margin: 0;
            background-color: blue;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            
        }
        .container{
    width: 70%;
    height: 60%;
    display: flex;
    align-items: stretch;
}
.block, .block1{
    width: 50%;
}
        .space{
    display: flex;
    justify-content: space-between;
    align-items: center;
}
        .block{
            background-color: black;
            color: white;
            padding: 20px;

        }
        .block1{
            background-color: white;
            color: #000;
            padding: 40px;
        }
        input{
    width: 80%;
    padding: 10px;
    margin-bottom: 10px;
}

button{
    width: 100%;
    padding: 10px;
    background-color: rgb(92, 92, 247);
    color: white;
    border: none;
    cursor: pointer;
}
img {
            max-width: 150px;
            margin-bottom: 20px;
        }
    </style>
    <body>
        <div class="container">
        <div class="block">
          <h1>Student Management System</h1>
          <p>✅<b>For Academic Staff?</b> <a href="#">Login</a> here using your employee number</p>
          <p>✅<b>For Student</b> <a href="#">Login</a> here usong Registration Number</p>  
        </div>
        <div class="block1">
            <img src="images/suza.png">
            <form>
                <input type="text" placeholder="Username*"><br><br>
                <input type="password" placeholder="Password"><br><br>
                <div class="space">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot Password?</a>
                </div><br>
                <button>SIGN IN</button>
            </form>
        </div>
        </div>
    </body>
</html>
