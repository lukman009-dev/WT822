
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Manage Courses</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="css/style.css"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-3"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html"><img src="images/suza.png" height="40"> SUZA</a><ul class="navbar-nav ms-auto"><li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person"></i> Account</a><ul class="dropdown-menu"><li><a class="dropdown-item" href="#" id="changePasswordBtn">🔒 Change password</a></li><li><a class="dropdown-item" href="#" id="changeProfileBtn">✏️ Profile</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger" href="#" id="logoutBtn">🚪 Logout</a></li></ul></li></ul></div></nav>
<div class="container my-4"><div class="d-flex justify-content-between"><h2><i class="bi bi-journal-bookmark-fill"></i> Courses Catalog</h2><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCourseModal">➕ Add Course</button></div><hr><div class="card shadow"><div class="card-body"><table id="coursesTable" class="table"><thead><tr><th>Course ID</th><th>Course Title</th><th>Credits</th><th>Instructor</th></tr></thead><tbody></tbody></table></div></div></div>
<div class="modal fade" id="addCourseModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-primary text-white"><h5>📘 New Course</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="addCourseForm"><input type="text" id="courseTitle" class="form-control mb-2" placeholder="Course Name" required><input type="number" id="courseCredits" class="form-control mb-2" placeholder="Credits" required><input type="text" id="courseInstructor" class="form-control mb-2" placeholder="Instructor Name" required><button type="submit" class="btn btn-primary w-100">Save Course</button></form></div></div></div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
let courses = [{id:"C101", title:"Web Development", credits:3, instructor:"Dr. Mwinyi"},{id:"C102", title:"Database Systems", credits:4, instructor:"Prof. Fatma"}];
let nextCid = 103;
$(document).ready(function(){
  const table = $('#coursesTable').DataTable({data: courses, columns:[{data:"id"},{data:"title"},{data:"credits"},{data:"instructor"}],pageLength:5});
  $('#addCourseForm').on('submit', function(e){
    e.preventDefault();
    const title=$('#courseTitle').val().trim(), credits=$('#courseCredits').val(), instr=$('#courseInstructor').val().trim();
    if(title && credits && instr){
      const newC = {id:`C${nextCid++}`, title, credits:parseInt(credits), instructor:instr};
      courses.push(newC); table.row.add(newC).draw();
      $('#addCourseForm')[0].reset(); $('#addCourseModal').modal('hide');
    } else alert('Fill all fields');
  });
});
</script>
</body>
</html>
