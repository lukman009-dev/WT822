<!-- manage-users.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Users | SUZA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="dashboard.html"><img src="images/suza.png" height="40" alt="logo"> SUZA Portal</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> Account</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#" id="changePasswordBtn">🔑 Change Password</a></li>
            <li><a class="dropdown-item" href="#" id="changeProfileBtn">📝 Change Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">🚪 Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center">
    <h2><i class="bi bi-people-fill me-2"></i>System Users</h2>
    <button class="btn btn-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#addUserModal"><i class="bi bi-plus-lg"></i> Add User</button>
  </div>
  <hr>
  <div class="card shadow-sm">
    <div class="card-body">
      <table id="usersTable" class="table table-striped w-100">
        <thead>
          <td><th>ID</th><th>Full Name</th><th>Email</th><th>Role</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal add user -->
<div class="modal fade" id="addUserModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white"><h5>➕ Add New User</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="addUserForm">
          <input type="text" id="userName" class="form-control mb-2" placeholder="Full Name" required>
          <input type="email" id="userEmail" class="form-control mb-2" placeholder="Email Address" required>
          <select id="userRole" class="form-select mb-3"><option>Admin</option><option>Registrar</option><option>Instructor</option><option>Student</option></select>
          <button type="submit" class="btn btn-success w-100">Create User</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
let usersData = [
  {id:1, name:"Dr. Ali Juma", email:"ali.juma@suza.ac.tz", role:"Admin"},
  {id:2, name:"Fatma Hassan", email:"fatma.h@suza.ac.tz", role:"Registrar"},
  {id:3, name:"John Mabrouk", email:"john.m@suza.ac.tz", role:"Instructor"}
];
let nextId = 4;
$(document).ready(function(){
  const table = $('#usersTable').DataTable({
    data: usersData,
    columns: [{data:"id"},{data:"name"},{data:"email"},{data:"role"}],
    pageLength: 5, responsive: true
  });
  $('#addUserForm').on('submit', function(e){
    e.preventDefault();
    const name = $('#userName').val().trim();
    const email = $('#userEmail').val().trim();
    const role = $('#userRole').val();
    if(name && email){
      const newUser = {id: nextId++, name, email, role};
      usersData.push(newUser);
      table.row.add(newUser).draw();
      $('#addUserForm')[0].reset();
      bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
    } else alert('Please fill all fields');
  });
});
</script>
</body>
</html>
