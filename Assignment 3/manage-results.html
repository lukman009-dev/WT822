<!-- manage-results.html -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Results Management</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"><link rel="stylesheet" href="css/style.css"></head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-3"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html"><img src="images/suza.png" height="40"> SUZA</a><ul class="navbar-nav ms-auto"><li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-badge"></i> Menu</a><ul class="dropdown-menu"><li><a class="dropdown-item" href="#" id="changePasswordBtn">🔐 Password</a></li><li><a class="dropdown-item" href="#" id="changeProfileBtn">👤 Profile</a></li><li><hr><li><a class="dropdown-item text-danger" href="#" id="logoutBtn">🚪 Logout</a></li></ul></li></ul></div></nav>
<div class="container my-4"><div class="d-flex justify-content-between flex-wrap gap-2"><h2>📊 Student Results</h2><div><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadResultModal"><i class="bi bi-cloud-upload"></i> Upload Results</button><button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#viewResultsModal"><i class="bi bi-eye"></i> View by Course</button></div></div><hr><div class="card shadow"><div class="card-body"><table id="resultsTable" class="table w-100"><thead><tr><th>Student</th><th>Course</th><th>Marks</th><th>Grade</th></tr></thead><tbody></tbody></table></div></div></div>
<!-- Upload Modal -->
<div class="modal fade" id="uploadResultModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-primary text-white"><h5>📤 Upload Exam Result</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="uploadResultForm"><input type="text" id="resultStudent" class="form-control mb-2" placeholder="Student Name" required><input type="text" id="resultCourse" class="form-control mb-2" placeholder="Course Name" required><input type="number" id="resultMarks" class="form-control mb-2" placeholder="Marks (0-100)" required><select id="resultGrade" class="form-select"><option>A</option><option>B+</option><option>B</option><option>C</option><option>D</option><option>F</option></select><button type="submit" class="btn btn-success mt-3 w-100">Save Result</button></form></div></div></div></div>
<!-- View results by course modal -->
<div class="modal fade" id="viewResultsModal"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header bg-secondary text-white"><h5>📖 Results for Specific Course</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><label>Select Course:</label><select id="courseFilterSelect" class="form-select mb-3"><option>Web Development</option><option>Database Systems</option><option>Networking</option></select><button id="filterResultsBtn" class="btn btn-info mb-3">Show Results</button><div class="table-responsive"><table class="table table-sm" id="filteredResultTable"><thead><tr><th>Student</th><th>Marks</th><th>Grade</th></tr></thead><tbody></tbody></table></div></div></div></div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
let results = [{student:"Aisha Mohammed", course:"Web Development", marks:88, grade:"A"},{student:"Omar Said", course:"Database Systems", marks:72, grade:"B+"}];
$(document).ready(function(){
  const table = $('#resultsTable').DataTable({data: results, columns:[{data:"student"},{data:"course"},{data:"marks"},{data:"grade"}], pageLength:5});
  $('#uploadResultForm').on('submit', function(e){
    e.preventDefault();
    let student=$('#resultStudent').val().trim(), course=$('#resultCourse').val().trim(), marks=parseInt($('#resultMarks').val()), grade=$('#resultGrade').val();
    if(student && course && !isNaN(marks)){
      const newRes = {student, course, marks, grade};
      results.push(newRes); table.row.add(newRes).draw();
      $('#uploadResultForm')[0].reset(); $('#uploadResultModal').modal('hide');
    } else alert('Complete all fields');
  });
  $('#filterResultsBtn').click(function(){
    const selectedCourse = $('#courseFilterSelect').val();
    const filtered = results.filter(r => r.course === selectedCourse);
    let html = '';
    filtered.forEach(r => { html += `<tr><td>${r.student}</td><td>${r.marks}</td><td>${r.grade}</td></tr>`; });
    $('#filteredResultTable tbody').html(html || '<tr><td colspan="3">No results for this course</td></tr>');
  });
});
</script>
</body>
</html>
