<!-- manage-students.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Manage Students</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-3"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html"><img src="images/suza.png" height="40"> SUZA</a>
<ul class="navbar-nav ms-auto"><li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> Menu</a><ul class="dropdown-menu"><li><a class="dropdown-item" href="#" id="changePasswordBtn">🔐 Password</a></li><li><a class="dropdown-item" href="#" id="changeProfileBtn">👤 Profile</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger" href="#" id="logoutBtn">🚪 Logout</a></li></ul></li></ul></div></nav>
<div class="container my-4"><div class="d-flex justify-content-between"><h2>📚 Student Records</h2><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addStudentModal">+ Add Student</button></div><hr>
<div class="card shadow"><div class="card-body"><table id="studentsTable" class="table"><thead><tr><th>Student ID</th><th>Full Name</th><th>Department</th><th>Year</th></tr></thead><tbody></tbody></table></div></div></div>
<div class="modal fade" id="addStudentModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-success text-white"><h5>🎓 New Student</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="addStudentForm"><input type="text" id="studentName" class="form-control mb-2" placeholder="Full Name" required><input type="text" id="studentDept" class="form-control mb-2" placeholder="Department (e.g., CS, IT)" required><select id="studentYear" class="form-select"><option>Year 1</option><option>Year 2</option><option>Year 3</option></select><button type="submit" class="btn btn-success mt-3 w-100">Add Student</button></form></div></div></div></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
let students = [{id:"S001", name:"Asha Suleiman", dept:"Computer Science", year:"Year 3"},{id:"S002", name:"Khalid Rashid", dept:"IT", year:"Year 2"}];
let nextStdId = 3;
$(document).ready(function(){
  const table = $('#studentsTable').DataTable({data: students, columns: [{data:"id"},{data:"name"},{data:"dept"},{data:"year"}], pageLength:5});
  $('#addStudentForm').on('submit', function(e){
    e.preventDefault();
    const name = $('#studentName').val().trim();
    const dept = $('#studentDept').val().trim();
    const year = $('#studentYear').val();
    if(name && dept){
      const newStd = {id: `S00${nextStdId++}`, name, dept, year};
      students.push(newStd);
      table.row.add(newStd).draw();
      $('#addStudentForm')[0].reset();
      bootstrap.Modal.getInstance(document.getElementById('addStudentModal')).hide();
    } else alert('Complete fields');
  });
});
</script>
</body>
</html>
